<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altrue Chatbot - Charity Recommendation Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px;
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .chat-header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .model-selector {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .model-selector select {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .model-selector select option {
            background: #4CAF50;
            color: white;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            animation: fadeIn 0.3s ease-in;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            color: white;
        }

        .message.bot .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            color: #333;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .message.user .message-avatar {
            background: #007bff;
            color: white;
        }

        .message.bot .message-avatar {
            background: #4CAF50;
            color: white;
        }

        .model-tag {
            font-size: 0.75rem;
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
            padding: 2px 6px;
            border-radius: 10px;
            margin-bottom: 5px;
            display: inline-block;
        }

        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #4CAF50;
        }

        .send-button {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .send-button:hover {
            transform: scale(1.1);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .clear-button {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .clear-button:hover {
            background: #ff3742;
        }

        .typing-indicator {
            display: none;
            align-items: center;
            color: #666;
            font-style: italic;
            margin-left: 45px;
        }

        .typing-dots {
            margin-left: 10px;
        }

        .typing-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.3;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .example-queries {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .example-query {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4CAF50;
            padding: 8px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .example-query:hover {
            background: rgba(76, 175, 80, 0.2);
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px 20px;
        }

        .empty-state h3 {
            color: #4CAF50;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .chat-container {
                width: 95%;
                height: 90vh;
            }

            .model-selector {
                position: static;
                transform: none;
                margin-top: 10px;
            }

            .chat-header {
                text-align: left;
            }

            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 Altrue Chatbot</h1>
            <p>Your AI-powered charity recommendation assistant</p>
            <div class="model-selector">
                <select id="modelSelect">
                    <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    <option value="gpt-4">GPT-4</option>
                </select>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <h3>Welcome to Altrue! 👋</h3>
                <p>Ask me about charities and I'll help you find the perfect organization to support.</p>
                <div class="example-queries">
                    <span class="example-query" onclick="sendExampleQuery('What are the top education charities in Kenya?')">
                        Education in Kenya
                    </span>
                    <span class="example-query" onclick="sendExampleQuery('Show me clean water projects in Africa')">
                        Clean Water Projects
                    </span>
                    <span class="example-query" onclick="sendExampleQuery('Compare health vs education charities')">
                        Health vs Education
                    </span>
                </div>
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            Bot is typing
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="chat-input">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Ask about charities, causes, or regions..." maxlength="500">
                <button class="send-button" id="sendButton" onclick="sendMessage()">➤</button>
                <button class="clear-button" onclick="clearChat()">Clear</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const typingIndicator = document.getElementById('typingIndicator');
        const modelSelect = document.getElementById('modelSelect');

        // Handle Enter key press
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Send message function
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            const selectedModel = modelSelect.value;

            // Clear input and disable send button
            messageInput.value = '';
            sendButton.disabled = true;

            // Add user message to chat
            addMessage('user', message);

            // Show typing indicator
            showTypingIndicator();

            try {
                // Send message to backend
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        model: selectedModel
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Add bot response to chat
                    addMessage('bot', data.response, data.model);
                } else {
                    addMessage('bot', `Error: ${data.error}`, 'error');
                }
            } catch (error) {
                addMessage('bot', `Connection error: ${error.message}`, 'error');
            } finally {
                // Hide typing indicator and re-enable send button
                hideTypingIndicator();
                sendButton.disabled = false;
            }
        }

        // Add message to chat
        function addMessage(type, content, model = null) {
            // Remove empty state if it exists
            const emptyState = chatMessages.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = type === 'user' ? '👤' : '🤖';

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';

            if (type === 'bot' && model && model !== 'error') {
                const modelTag = document.createElement('div');
                modelTag.className = 'model-tag';
                modelTag.textContent = model.toUpperCase();
                messageContent.appendChild(modelTag);
            }

            const messageText = document.createElement('div');
            messageText.textContent = content;
            messageContent.appendChild(messageText);

            if (type === 'user') {
                messageDiv.appendChild(messageContent);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(messageContent);
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            typingIndicator.style.display = 'flex';
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Hide typing indicator
        function hideTypingIndicator() {
            typingIndicator.style.display = 'none';
        }

        // Send example query
        function sendExampleQuery(query) {
            messageInput.value = query;
            sendMessage();
        }

        // Clear chat
        async function clearChat() {
            if (confirm('Are you sure you want to clear the chat history?')) {
                try {
                    await fetch('/api/clear', { method: 'POST' });
                    chatMessages.innerHTML = `
                        <div class="empty-state">
                            <h3>Chat cleared! 🧹</h3>
                            <p>Start a new conversation about charities and causes.</p>
                        </div>
                    `;
                } catch (error) {
                    console.error('Error clearing chat:', error);
                }
            }
        }

        // Load chat history on page load
        async function loadChatHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();

                if (data.history && data.history.length > 0) {
                    chatMessages.innerHTML = '';
                    data.history.forEach(msg => {
                        addMessage(msg.type, msg.message, msg.model);
                    });
                }
            } catch (error) {
                console.error('Error loading chat history:', error);
            }
        }

        // Load history when page loads
        window.addEventListener('load', loadChatHistory);
    </script>
</body>
</html>
